<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP32 Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    color: white;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
    gap: 20px;
    padding: 20px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    text-align: center;
}

/* BUTTON */
button {
    padding: 12px 25px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
}

.on { background: #00c853; }
.off { background: #d50000; }

#ledStatus {
    font-size: 20px;
    margin-top: 10px;
}

/* MAP */
iframe {
    width: 100%;
    height: 200px;
    border-radius: 10px;
}
</style>
</head>

<body>

<h2 style="text-align:center">ESP32 SMART DASHBOARD</h2>

<div class="container">

<!-- LED -->
<div class="card">
    <h3>💡 LED</h3>
    <button class="on" onclick="sendMQTT('ON')">BẬT</button>
    <button class="off" onclick="sendMQTT('OFF')">TẮT</button>
    <div id="ledStatus">---</div>
</div>

<!-- TIME -->
<div class="card">
    <h3>🕒 Thời gian</h3>
    <div id="time"></div>
    <div id="date"></div>
</div>

<!-- WEATHER -->
<div class="card">
    <h3>🌤 Thời tiết</h3>
    <div id="weather">Loading...</div>
</div>

<!-- MAP -->
<div class="card">
    <h3>🗺 Vị trí</h3>
    <iframe src="https://maps.google.com/maps?q=10.851013944312026,106.7719978093065&z=15&output=embed"></iframe>
</div>

</div>

<script>
/* MQTT */
var client = new Paho.MQTT.Client(
    "815ea3e97ad64fa2b2ed517135326496.s1.eu.hivemq.cloud",
    8884,
    "web-" + Math.random()
);

client.onMessageArrived = function(msg) {
    let state = msg.payloadString;

    // HIỂN THỊ ĐÚNG (KHÔNG ĐẢO)
    if(state === "ON"){
        document.getElementById("ledStatus").innerText = "💡 ĐANG BẬT";
    } else {
        document.getElementById("ledStatus").innerText = "🌑 ĐANG TẮT";
    }
};

client.connect({
    useSSL: true,
    userName: "ESP32C3_control",
    password: "ESP32C3_control",
    onSuccess: () => {
        client.subscribe("hau_esp32c3/led/status");
    }
});

function sendMQTT(cmd){
    let m = new Paho.MQTT.Message(cmd);
    m.destinationName = "hau_esp32c3/led/control";
    client.send(m);
}

/* TIME */
setInterval(()=>{
    let now = new Date();
    document.getElementById("time").innerText =
        now.toLocaleTimeString("vi-VN",{timeZone:"Asia/Ho_Chi_Minh"});
    document.getElementById("date").innerText =
        now.toLocaleDateString("vi-VN");
},1000);

/* WEATHER (5s) */
const apiKey = "8f793fc0f4924a4ead491332261105";
const lat = 10.851013944312026;
const lon = 106.7719978093065;

function getWeather(){
    fetch(`https://api.weatherapi.com/v1/current.json?key=${apiKey}&q=${lat},${lon}&lang=vi`)
    .then(r=>r.json())
    .then(d=>{
        document.getElementById("weather").innerHTML =
            `${d.current.temp_c}°C - ${d.current.condition.text}`;
    });
}

getWeather();
setInterval(getWeather, 5000);
</script>

</body>
</html>
