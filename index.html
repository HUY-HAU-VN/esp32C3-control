<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP32-C3 Smart Control</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>

<style>
    body {
        font-family: Arial;
        text-align: center;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        color: white;
    }

    .container {
        margin-top: 30px;
    }

    .card {
        background: rgba(255,255,255,0.1);
        padding: 20px;
        margin: 15px auto;
        border-radius: 15px;
        width: 320px;
        backdrop-filter: blur(10px);
        box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    button {
        padding: 15px 30px;
        margin: 10px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
    }

    .on { background: #00c853; color: white; }
    .off { background: #d50000; color: white; }

    #status { margin-top: 10px; }
</style>
</head>

<body>

<h2>ESP32-C3 SMART CONTROL</h2>

<div class="container">

    <!-- LED -->
    <div class="card">
        <h3>Điều khiển LED</h3>
        <button class="on" onclick="sendMQTT('ON')">BẬT</button>
        <button class="off" onclick="sendMQTT('OFF')">TẮT</button>
        <p id="ledStatus">Trạng thái: ---</p>
    </div>

    <!-- TIME -->
    <div class="card">
        <h3>Thời gian (Hà Nội)</h3>
        <p id="time"></p>
        <p id="date"></p>
    </div>

    <!-- WEATHER -->
    <div class="card">
        <h3>Thời tiết</h3>
        <p id="temp"></p>
        <p id="weather"></p>
    </div>

    <!-- MAP -->
    <div class="card">
        <h3>Vị trí</h3>
        <iframe
            width="100%"
            height="200"
            style="border-radius:10px;"
            src="https://maps.google.com/maps?q=10.851013944312026,106.7719978093065&z=15&output=embed">
        </iframe>
    </div>

    <div id="status">MQTT: Đang kết nối...</div>

</div>

<script>
/* ================= MQTT ================= */
var broker = "815ea3e97ad64fa2b2ed517135326496.s1.eu.hivemq.cloud";
var port = 8884;
var topic = "hau_esp32c3/led/control";

var client = new Paho.MQTT.Client(broker, port, "web_" + Math.random());

client.onConnectionLost = () => {
    document.getElementById("status").innerText = "MQTT: Mất kết nối";
};

client.connect({
    useSSL: true,
    userName: "ESP32C3_control",
    password: "ESP32C3_control",

    onSuccess: () => {
        document.getElementById("status").innerText = "MQTT: Đã kết nối";
        client.subscribe(topic);
    }
});

/* nhận phản hồi */
client.onMessageArrived = (message) => {
    let msg = message.payloadString;

    // ĐẢO HIỂN THỊ (do code ESP bạn bị đảo)
    if(msg === "ON"){
        document.getElementById("ledStatus").innerText = "Trạng thái: ĐANG TẮT";
    } else {
        document.getElementById("ledStatus").innerText = "Trạng thái: ĐANG BẬT";
    }
};

function sendMQTT(cmd){
    let message = new Paho.MQTT.Message(cmd);
    message.destinationName = topic;
    client.send(message);
}

/* ================= TIME ================= */
function updateTime(){
    let now = new Date();

    let time = now.toLocaleTimeString("vi-VN", {timeZone: "Asia/Ho_Chi_Minh"});
    let date = now.toLocaleDateString("vi-VN");

    document.getElementById("time").innerText = time;
    document.getElementById("date").innerText = date;
}
setInterval(updateTime,1000);

/* ================= WEATHER ================= */
const apiKey = "8f793fc0f4924a4ead491332261105";
const lat = "10.851013944312026";
const lon = "106.7719978093065";

fetch(`https://api.weatherapi.com/v1/current.json?key=${apiKey}&q=${lat},${lon}`)
.then(res => res.json())
.then(data => {
    document.getElementById("temp").innerText =
        "Nhiệt độ: " + data.current.temp_c + "°C";

    document.getElementById("weather").innerText =
        data.current.condition.text;
});
</script>

</body>
</html>
