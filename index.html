<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP32 Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    margin: 0;
    color: white;
    text-align: center;
}

.container { padding: 20px; }

.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 20px;
    margin: 15px auto;
    width: 340px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

#map {
    height: 250px;
    border-radius: 10px;
}

.btn {
    padding: 15px 40px;
    font-size: 18px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    color: white;
}

.on { background: #4CAF50; }
.off { background: #f44336; }

#clock { font-size: 28px; }
#date { opacity: 0.8; }

#ledStatus { font-size: 22px; margin-top: 10px; }
</style>
</head>

<body>

<div class="container">
    <h2>📡 ESP32 Dashboard</h2>

    <!-- CLOCK -->
    <div class="card">
        <div id="clock"></div>
        <div id="date"></div>
    </div>

    <!-- LED -->
    <div class="card">
        <h3>💡 LED</h3>
        <button class="btn on" onclick="sendMQTT('ON')">BẬT</button>
        <button class="btn off" onclick="sendMQTT('OFF')">TẮT</button>
        <div id="ledStatus">Đang chờ...</div>
        <div id="status">MQTT...</div>
    </div>

    <!-- WEATHER -->
    <div class="card">
        <h3>🌤 Thời tiết</h3>
        <div id="weather">Loading...</div>
    </div>

    <!-- MAP -->
    <div class="card">
        <h3>🗺 Vị trí</h3>
        <div id="map"></div>
    </div>
</div>

<script>
// ===== MQTT =====
var client = new Paho.MQTT.Client(
    "815ea3e97ad64fa2b2ed517135326496.s1.eu.hivemq.cloud",
    8884,
    "web-" + Math.random()
);

client.onMessageArrived = function(msg) {
    let state = msg.payloadString;
    let led = document.getElementById("ledStatus");

    // đảo trạng thái
    if (state === "ON") {
        led.innerText = "🌑 TẮT";
        led.style.color = "red";
    } else {
        led.innerText = "💡 BẬT";
        led.style.color = "lime";
    }
};

client.connect({
    useSSL: true,
    userName: "ESP32C3_control",
    password: "ESP32C3_control",
    onSuccess: () => {
        document.getElementById("status").innerText = "MQTT OK";
        client.subscribe("hau_esp32c3/led/status");
    }
});

function sendMQTT(cmd) {
    let m = new Paho.MQTT.Message(cmd);
    m.destinationName = "hau_esp32c3/led/control";
    client.send(m);
}

// ===== CLOCK =====
setInterval(() => {
    let now = new Date();
    document.getElementById("clock").innerText =
        now.toLocaleTimeString("vi-VN",{timeZone:"Asia/Ho_Chi_Minh"});
    document.getElementById("date").innerText =
        now.toLocaleDateString("vi-VN",{timeZone:"Asia/Ho_Chi_Minh"});
}, 1000);

// ===== WEATHER =====
const apiKey = "YOUR_API_KEY";
const lat = 10.851013944312026;
const lon = 106.7719978093065;

function getWeather() {
    fetch(`https://api.weatherapi.com/v1/current.json?key=${apiKey}&q=${lat},${lon}&lang=vi`)
    .then(r => r.json())
    .then(d => {
        document.getElementById("weather").innerHTML =
            `<img src="https:${d.current.condition.icon}">
             ${d.current.temp_c}°C | ${d.current.condition.text}`;
    });
}
getWeather();

// ===== MAP =====
var map = L.map('map').setView([lat, lon], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
}).addTo(map);

L.marker([lat, lon]).addTo(map)
    .bindPopup("📍 Vị trí của bạn")
    .openPopup();

</script>

</body>
</html>
