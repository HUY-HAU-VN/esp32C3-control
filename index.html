<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>ESP32 Smart Control</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #2c3e50);
    color: white;
    text-align: center;
    margin-top: 50px;
}

.card {
    background: #2f3640;
    padding: 40px;
    border-radius: 20px;
    width: 320px;
    margin: auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h2 {
    margin-bottom: 30px;
}

.btn {
    width: 120px;
    padding: 15px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

.btn-on {
    background: #00c853;
}
.btn-on:hover {
    background: #00e676;
    transform: scale(1.05);
}

.btn-off {
    background: #d50000;
}
.btn-off:hover {
    background: #ff1744;
    transform: scale(1.05);
}

.status-box {
    margin-top: 20px;
    padding: 10px;
    border-radius: 10px;
    background: #353b48;
}

.led {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: inline-block;
    margin-left: 10px;
}

.led-on {
    background: #00e676;
    box-shadow: 0 0 10px #00e676;
}

.led-off {
    background: #555;
}

</style>
</head>

<body>

<div class="card">
    <h2>ESP32 CONTROL</h2>

    <button class="btn btn-on" onclick="sendMQTT('ON')">BẬT</button>
    <button class="btn btn-off" onclick="sendMQTT('OFF')">TẮT</button>

    <div class="status-box">
        MQTT: <span id="mqttStatus">Đang kết nối...</span>
    </div>

    <div class="status-box">
        LED: <span id="ledText">---</span>
        <span id="ledIndicator" class="led led-off"></span>
    </div>
</div>

<script>
// ===== CONFIG =====
var broker = "815ea3e97ad64fa2b2ed517135326496.s1.eu.hivemq.cloud";
var port = 8884;
var topic_sub = "hau_esp32c3/led/status";
var topic_pub = "hau_esp32c3/led/control";

var clientId = "WEB_" + Math.random().toString(16).substr(2, 8);
var client = new Paho.MQTT.Client(broker, port, clientId);

// ===== CONNECT =====
function connectMQTT() {
    client.connect({
        useSSL: true,
        userName: "ESP32C3_control",
        password: "ESP32C3_control",
        keepAliveInterval: 60,
        onSuccess: function () {
            document.getElementById("mqttStatus").innerText = "Đã kết nối";
            client.subscribe(topic_sub);
        },
        onFailure: function () {
            document.getElementById("mqttStatus").innerText = "Lỗi, reconnect...";
            setTimeout(connectMQTT, 3000);
        }
    });
}

// ===== RECEIVE =====
client.onMessageArrived = function (message) {
    var msg = message.payloadString;

    document.getElementById("ledText").innerText = msg;

    let led = document.getElementById("ledIndicator");

    if (msg === "LED_ON") {
        led.className = "led led-on";
    } else {
        led.className = "led led-off";
    }
};

// ===== LOST =====
client.onConnectionLost = function () {
    document.getElementById("mqttStatus").innerText = "Mất kết nối...";
    setTimeout(connectMQTT, 3000);
};

// ===== SEND =====
function sendMQTT(cmd) {
    if (!client.isConnected()) {
        alert("Chưa kết nối MQTT!");
        return;
    }

    var message = new Paho.MQTT.Message(cmd);
    message.destinationName = topic_pub;
    client.send(message);
}

// start
connectMQTT();
</script>

</body>
</html>
