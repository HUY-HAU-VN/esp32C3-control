<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Điều khiển ESP32-C3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
</head>

<body style="text-align:center; font-family:Arial; margin-top:50px;">

<h2>ESP32-C3 MQTT Control</h2>

<button onclick="sendMQTT('ON')" style="padding:15px 30px;">BẬT</button>
<button onclick="sendMQTT('OFF')" style="padding:15px 30px;">TẮT</button>

<p id="status">Đang kết nối...</p>

<script>
var broker = "815ea3e97ad64fa2b2ed517135326496.s1.eu.hivemq.cloud";
var port = 8884;
var topic = "hau_esp32c3/led/control";

// 🔥 clientID KHÔNG TRÙNG ESP
var clientId = "WEB_" + Math.random().toString(16).substr(2, 8);

var client = new Paho.MQTT.Client(broker, port, clientId);

// ===== CALLBACK =====
client.onConnectionLost = function () {
    document.getElementById("status").innerText = "Mất kết nối! Đang reconnect...";
    setTimeout(connectMQTT, 3000); // auto reconnect
};

// ===== CONNECT =====
function connectMQTT() {
    client.connect({
        useSSL: true,
        userName: "ESP32C3_control",
        password: "ESP32C3_control",

        timeout: 10,
        keepAliveInterval: 60,
        cleanSession: true,

        onSuccess: function () {
            document.getElementById("status").innerText = "Đã kết nối MQTT";
        },

        onFailure: function () {
            document.getElementById("status").innerText = "Kết nối lỗi, thử lại...";
            setTimeout(connectMQTT, 3000);
        }
    });
}

// ===== SEND =====
function sendMQTT(cmd) {
    if (!client.isConnected()) {
        alert("Chưa kết nối MQTT!");
        return;
    }

    var msg = new Paho.MQTT.Message(cmd);
    msg.destinationName = topic;
    client.send(msg);

    console.log("Send:", cmd);
}

// start
connectMQTT();
</script>

</body>
</html>
